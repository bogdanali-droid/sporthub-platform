name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run D1 migrations
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute sporthub-db --remote --file=schema.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=schema_part2.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/002_baseball5_softball_complete.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/003_frbs_federation_layer.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/004_frbs_seed.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/005_live_scoring_video.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/006_demo_club_seed.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/007_demo_refresh.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/008_superadmin_portal.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/009_user_sport_codes.sql || true
          npx wrangler d1 execute sporthub-db --remote --file=db/migrations/010_demo_repopulate.sql || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sporthub-platform
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
