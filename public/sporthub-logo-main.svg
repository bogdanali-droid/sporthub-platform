  <!-- Middle chevron - lighter orange -->
  <path d="M 33 56 L 50 44 L 67 56" 
        stroke="#FF9270" 
        stroke-width="7" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Top chevron - white -->
  <path d="M 36 44 L 50 34 L 64 44" 
        stroke="white" 
        stroke-width="7" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
